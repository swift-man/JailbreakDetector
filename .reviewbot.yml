version: 1

review:
  include:
    - "**/*.swift"
    - "Package.swift"
    - "**/Info.plist"
    - "README.md"
    - "**/*.docc/**/*.md"

  exclude:
    # dependency / build output
    - "Pods/**"
    - "Carthage/**"
    - ".build/**"
    - "DerivedData/**"
    - "build/**"
    - "dist/**"
    - "node_modules/**"
    - "vendor/**"
    - ".swiftpm/xcode/**"

    # generated files
    - "**/Generated/**"
    - "**/*.generated.swift"
    - "**/*.pb.swift"
    - "**/*.graphql.swift"
    - "**/*+Generated.swift"

    # resources
    - "**/*.xcassets/**"
    - "**/*.png"
    - "**/*.jpg"
    - "**/*.jpeg"
    - "**/*.gif"
    - "**/*.webp"
    - "**/*.pdf"
    - "**/*.mp4"
    - "**/*.mov"

    # lock files
    - "Package.resolved"
    - "Podfile.lock"

    # docs / generated DocC output
    - "CHANGELOG.md"
    - "docs/**"
    - "JailbreakDetector.doccarchive/**"
    - "**/*.doccarchive/**"

  always_review:
    - ".reviewbot.yml"
    - "AGENTS.md"
    - "README.md"
    - "Package.swift"
