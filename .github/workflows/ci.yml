name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Run Swift Testing
        run: swift test

      - name: Build iOS package
        run: xcodebuild -scheme JailbreakDetector -destination 'generic/platform=iOS' build
